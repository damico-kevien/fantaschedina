<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Inviti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row">
        <!-- Form invio invito -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Invia invito</div>
                <div class="card-body">
                    <form th:action="@{/admin/invites/send}" th:object="${inviteRequest}" method="post">
                        <div class="mb-3">
                            <label for="leagueId" class="form-label">Lega</label>
                            <select class="form-select" id="leagueId" th:field="*{leagueId}" required>
                                <option value="">— Seleziona —</option>
                                <option th:each="league : ${leagues}"
                                        th:value="${league.id}"
                                        th:text="${league.name + ' (' + league.season + ')'}">
                                </option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('leagueId')}"
                                 th:errors="*{leagueId}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email destinatario</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Invia invito</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Lista inviti -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Inviti inviati</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Email</th>
                                <th>Lega</th>
                                <th>Stato</th>
                                <th>Scadenza</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(invites)}">
                                <td colspan="5" class="text-center text-muted py-3">Nessun invito inviato</td>
                            </tr>
                            <tr th:each="invite : ${invites}">
                                <td th:text="${invite.email}"></td>
                                <td th:text="${leagueNames[invite.leagueId]}"></td>
                                <td>
                                    <span th:text="${invite.status}"
                                          th:classappend="${invite.status.name() == 'PENDING' ? 'bg-warning text-dark' : (invite.status.name() == 'USED' ? 'bg-success' : 'bg-secondary')}"
                                          class="badge">
                                    </span>
                                </td>
                                <td th:text="${#temporals.format(invite.expiresAt, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <button th:if="${invite.status.name() == 'PENDING'}"
                                            type="button"
                                            class="btn btn-outline-danger btn-sm"
                                            data-bs-toggle="modal"
                                            data-bs-target="#confirmModal"
                                            th:attr="data-confirm-action=@{/admin/invites/{id}/revoke(id=${invite.id})},
                                                     data-confirm-message='Revocare l\'invito per ' + ${invite.email} + '?',
                                                     data-confirm-title='Revoca invito'">
                                        Revoca
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragments/confirm-modal :: confirmModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
