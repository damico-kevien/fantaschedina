<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Leghe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Leghe</h4>
        <a href="/admin/leagues/new" class="btn btn-primary btn-sm">+ Nuova lega</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nome</th>
                        <th>Stagione</th>
                        <th>Costo</th>
                        <th>Stato</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(leagues)}">
                        <td colspan="5" class="text-center text-muted py-3">Nessuna lega creata</td>
                    </tr>
                    <tr th:each="league : ${leagues}">
                        <td th:text="${league.name}"></td>
                        <td th:text="${league.season}"></td>
                        <td th:text="${league.matchdayCost} + ' cr'"></td>
                        <td>
                            <span class="badge"
                                  th:text="${league.status}"
                                  th:classappend="${league.status.name() == 'ACTIVE' ? 'bg-success' : (league.status.name() == 'SETUP' ? 'bg-warning text-dark' : 'bg-secondary')}">
                            </span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/admin/leagues/{id}(id=${league.id})}"
                               class="btn btn-outline-secondary btn-sm">Dettaglio</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
