<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Fantaschedina — ' + ${league.name} + ' — Componenti'">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="mb-4">
        <a th:href="@{/admin/leagues/{id}(id=${league.id})}" class="text-muted small">← Dettaglio lega</a>
        <h4 class="mb-0 mt-1" th:text="${league.name} + ' — Componenti'"></h4>
        <span class="text-muted" th:text="${league.season}"></span>
    </div>

    <div class="row g-4">

        <!-- Jackpot -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Jackpot</div>
                <div class="card-body">
                    <div class="display-6 fw-bold mb-3" th:text="${jackpot.currentAmount} + ' cr'"></div>
                    <form th:action="@{/admin/leagues/{id}/members/jackpot/adjust(id=${league.id})}" method="post">
                        <div class="mb-2">
                            <label class="form-label small fw-semibold">Nuovo valore</label>
                            <div class="input-group input-group-sm">
                                <input type="number" name="newAmount" class="form-control"
                                       th:value="${jackpot.currentAmount}" min="0" required>
                                <span class="input-group-text">cr</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Nota (opzionale)</label>
                            <input type="text" name="note" class="form-control form-control-sm"
                                   placeholder="Motivo della rettifica">
                        </div>
                        <button type="submit" class="btn btn-warning btn-sm w-100">Aggiorna jackpot</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Componenti -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
                    <span>Componenti</span>
                    <span class="text-muted small" th:text="${#lists.size(members)} + ' iscritti'"></span>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(members)}" class="p-3 text-muted">
                        Nessun iscritto.
                    </div>
                    <table th:unless="${#lists.isEmpty(members)}"
                           class="table table-sm table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Utente</th>
                                <th>Squadra</th>
                                <th class="text-end">Crediti</th>
                                <th style="width: 260px">Rettifica</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="row : ${members}">
                                <td th:text="${row.user().username}"></td>
                                <td class="text-muted small"
                                    th:text="${row.fantaTeam() != null ? row.fantaTeam().name : '—'}"></td>
                                <td class="text-end fw-semibold"
                                    th:text="${row.membership().balance} + ' cr'"></td>
                                <td>
                                    <form th:action="@{/admin/leagues/{lid}/members/{mid}/adjust(lid=${league.id},mid=${row.membership().id})}"
                                          method="post" class="d-flex gap-1 align-items-center">
                                        <div class="input-group input-group-sm" style="width: 120px">
                                            <input type="number" name="delta" class="form-control"
                                                   placeholder="es. +5 o -3" required>
                                            <span class="input-group-text">cr</span>
                                        </div>
                                        <input type="text" name="note" class="form-control form-control-sm"
                                               placeholder="Nota" style="width: 90px">
                                        <button type="submit" class="btn btn-outline-primary btn-sm">OK</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Audit log -->
    <div class="card shadow-sm mt-4">
        <div class="card-header fw-semibold">Storico modifiche admin</div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(auditLog)}" class="p-3 text-muted">Nessuna modifica registrata.</div>
            <table th:unless="${#lists.isEmpty(auditLog)}"
                   class="table table-sm table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Data</th>
                        <th>Tipo</th>
                        <th class="text-end">Importo</th>
                        <th>Nota</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${auditLog}">
                        <td class="text-muted small"
                            th:text="${#temporals.format(log.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${log.type.label}"></td>
                        <td class="text-end" th:text="${log.amount != null ? log.amount + ' cr' : '—'}"></td>
                        <td class="text-muted small" th:text="${log.note != null ? log.note : '—'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
