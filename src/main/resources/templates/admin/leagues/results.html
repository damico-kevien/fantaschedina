<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Risultati — Giornata ' + ${matchday.number}">Fantaschedina Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 680px;">

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="mb-4">
        <a th:href="@{/admin/leagues/{id}/calendar(id=${league.id})}" class="text-muted small">← Calendario</a>
        <h4 class="mb-0 mt-1" th:text="'Inserisci risultati — Giornata ' + ${matchday.number}"></h4>
        <span class="text-muted" th:text="${league.name}"></span>
    </div>

    <form th:action="@{/admin/leagues/{lid}/matchdays/{mid}/results(lid=${league.id},mid=${matchday.id})}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Casa</th>
                        <th class="text-center" style="width: 60px;">G</th>
                        <th class="text-center" style="width: 20px;">-</th>
                        <th class="text-center" style="width: 60px;">G</th>
                        <th>Trasferta</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fixture, i : ${fixtures}">
                        <input type="hidden"
                               th:name="'fixtures[' + ${i.index} + '].fixtureId'"
                               th:value="${fixture.id}">
                        <td class="fw-semibold" th:text="${teamNames[fixture.homeFantaTeamId]}"></td>
                        <td>
                            <input type="number" class="form-control form-control-sm text-center"
                                   th:name="'fixtures[' + ${i.index} + '].homeScore'"
                                   th:value="${fixture.homeScore}"
                                   min="0" max="99" required>
                        </td>
                        <td class="text-center text-muted">-</td>
                        <td>
                            <input type="number" class="form-control form-control-sm text-center"
                                   th:name="'fixtures[' + ${i.index} + '].awayScore'"
                                   th:value="${fixture.awayScore}"
                                   min="0" max="99" required>
                        </td>
                        <td class="fw-semibold" th:text="${teamNames[fixture.awayFantaTeamId]}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">
                Conferma risultati ed elabora schedine
            </button>
        </div>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
