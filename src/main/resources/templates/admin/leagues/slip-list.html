<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Schedine — Giornata ' + ${matchday.number}">Fantaschedina Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 720px;">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="mb-4">
        <a th:href="@{/admin/leagues/{id}/calendar(id=${league.id})}" class="text-muted small">← Calendario</a>
        <h4 class="mb-0 mt-1" th:text="'Schedine — Giornata ' + ${matchday.number}"></h4>
        <span class="text-muted" th:text="${league.name}"></span>
    </div>

    <div th:if="${#lists.isEmpty(slips)}" class="text-muted fst-italic">
        Nessuna schedina inviata per questa giornata.
    </div>

    <div class="card shadow-sm" th:if="${!#lists.isEmpty(slips)}">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Squadra</th>
                    <th class="text-center">Stato</th>
                    <th class="text-center">Auto</th>
                    <th class="text-center">Modificata</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="slip : ${slips}">
                    <td th:text="${teamNames[slip.fantaTeamId]}"></td>
                    <td class="text-center">
                        <span class="badge"
                              th:text="${slip.status.label}"
                              th:classappend="${slip.status.name() == 'WON'} ? 'bg-success' :
                                              (${slip.status.name() == 'LOST'} ? 'bg-danger' :
                                              (${slip.status.name() == 'VOID'} ? 'bg-secondary' : 'bg-primary'))">
                        </span>
                    </td>
                    <td class="text-center">
                        <span th:if="${slip.isAutoSubmitted}" class="text-warning small">Auto</span>
                        <span th:unless="${slip.isAutoSubmitted}" class="text-muted small">—</span>
                    </td>
                    <td class="text-center">
                        <span th:if="${slip.isAdminModified}" class="text-info small">Sì</span>
                        <span th:unless="${slip.isAdminModified}" class="text-muted small">—</span>
                    </td>
                    <td class="text-end">
                        <a th:if="${matchday.status.name() == 'OPEN'}"
                           th:href="@{/admin/leagues/{lid}/slips/{sid}/edit(lid=${league.id},sid=${slip.id})}"
                           class="btn btn-sm btn-outline-primary">Modifica</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
