<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-4">Le mie leghe</h4>

    <div th:if="${#lists.isEmpty(leagueCards)}" class="alert alert-info">
        Non sei ancora iscritto a nessuna lega. Attendi un invito dall'amministratore.
    </div>

    <div class="row g-3">
        <div class="col-md-4" th:each="card : ${leagueCards}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${card.league.name}"></h5>
                    <p class="text-muted mb-1" th:text="${card.league.season}"></p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="fw-bold">
                            Crediti: <span th:text="${card.membership.balance}"></span>
                        </span>
                        <span class="badge"
                              th:classappend="${card.league.status.name() == 'ACTIVE'} ? 'bg-success' : (${card.league.status.name() == 'SETUP'} ? 'bg-warning text-dark' : 'bg-secondary')"
                              th:text="${card.league.status}"></span>
                    </div>
                </div>
                <div class="card-footer bg-transparent">
                    <a th:href="@{/leagues/{id}/matchdays(id=${card.league.id})}"
                       class="btn btn-primary btn-sm w-100">Vai alle giornate</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
