<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Accetta invito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-sm-8 col-md-6 col-lg-4">

            <div class="text-center mb-4">
                <h2 class="fw-bold">Fantaschedina</h2>
                <p class="text-muted">Sei stato invitato a unirti a una lega!</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3">Scegli il nome del tuo team</h5>

                    <form th:action="@{/invite/accept}" method="post">
                        <input type="hidden" name="token" th:value="${token}">
                        <div class="mb-3">
                            <label for="fantaTeamName" class="form-label">Nome FantaTeam</label>
                            <input type="text" class="form-control" id="fantaTeamName"
                                   name="fantaTeamName" minlength="2" maxlength="100" required autofocus>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Entra nella lega</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
