<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Invito non valido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-sm-8 col-md-6 col-lg-4 text-center">

            <h2 class="fw-bold mb-3">Fantaschedina</h2>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="text-danger mb-3">Invito non valido</h5>
                    <p class="text-muted" th:text="${error}">Questo invito non è valido.</p>
                    <a href="/login" class="btn btn-outline-primary mt-2">Vai al login</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
