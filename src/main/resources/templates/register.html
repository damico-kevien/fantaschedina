<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantaschedina — Registrazione</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-sm-8 col-md-6 col-lg-5">

            <div class="text-center mb-4">
                <h2 class="fw-bold">Fantaschedina</h2>
                <p class="text-muted">Crea il tuo account per unirti alla lega</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username"
                                   th:field="*{username}" autocomplete="username" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password"
                                   th:field="*{password}" autocomplete="new-password" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="fantaTeamName" class="form-label">Nome FantaTeam</label>
                            <input type="text" class="form-control" id="fantaTeamName"
                                   th:field="*{fantaTeamName}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('fantaTeamName')}"
                                 th:errors="*{fantaTeamName}"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Registrati e unisciti alla lega</button>
                        </div>
                    </form>

                </div>
            </div>

            <p class="text-center mt-3 small text-muted">
                Hai già un account? <a href="/login">Accedi</a>
            </p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
