<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Schedina — Giornata ' + ${matchday.number}">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 680px;">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{id}/matchdays(id=${league.id})}" th:text="${league.name}"></a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{lid}/matchdays/{mid}(lid=${league.id},mid=${matchday.id})}"
                   th:text="'Giornata ' + ${matchday.number}"></a>
            </li>
            <li class="breadcrumb-item active">Schedina</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-1">
        <h4 class="mb-0" th:text="'Schedina — Giornata ' + ${matchday.number}"></h4>
        <span class="text-muted small" th:if="${myTeam != null}" th:text="${myTeam.name}"></span>
    </div>

    <div class="alert alert-success d-flex justify-content-between align-items-center mb-4" th:if="${deadline != null}">
        <span>Scadenza: <strong th:text="${#temporals.format(deadline, 'dd/MM/yyyy HH:mm')}"></strong></span>
        <span id="countdown" class="fw-bold"></span>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(pickSlots)}" class="alert alert-warning">
        Il BetTemplate per questa lega non è ancora configurato. Contatta l'amministratore.
    </div>

    <form th:unless="${#lists.isEmpty(pickSlots)}"
          th:action="@{/leagues/{lid}/matchdays/{mid}/bet(lid=${league.id},mid=${matchday.id})}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div th:each="slot, slotStat : ${pickSlots}">

            <!-- Separatore di sezione quando cambia il tipo -->
            <div th:if="${slotStat.first or slot.template.outcomeType != pickSlots[__${slotStat.index - 1}__].template.outcomeType}"
                 class="mt-3 mb-2">
                <span class="badge bg-secondary" th:text="${slot.template.outcomeType.label}"></span>
                <span th:if="${slot.template.outcomeType.name() == 'OVER_UNDER'}"
                      class="text-muted ms-1 small"
                      th:text="'(soglia ' + ${slot.template.overUnderThreshold} + ')'"></span>
            </div>

            <div class="card mb-2">
                <div class="card-body py-2">

                    <select class="form-select form-select-sm mb-2"
                            th:name="'picks[' + ${slot.index} + '].fixtureId'"
                            required>
                        <option value="">— Seleziona partita —</option>
                        <option th:each="f : ${fixtures}"
                                th:value="${f.id}"
                                th:text="${teamNames[f.homeFantaTeamId]} + ' vs ' + ${teamNames[f.awayFantaTeamId]}">
                        </option>
                    </select>

                    <input type="hidden"
                           th:name="'picks[' + ${slot.index} + '].outcomeType'"
                           th:value="${slot.template.outcomeType}">

                    <div class="btn-group w-100" role="group">

                        <th:block th:if="${slot.template.outcomeType.name() == 'RESULT_1X2'}">
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="1"  th:id="'p' + ${slot.index} + '_1'"  required>
                            <label class="btn btn-outline-primary btn-sm" th:for="'p' + ${slot.index} + '_1'">1</label>
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="X"  th:id="'p' + ${slot.index} + '_X'">
                            <label class="btn btn-outline-primary btn-sm" th:for="'p' + ${slot.index} + '_X'">X</label>
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="2"  th:id="'p' + ${slot.index} + '_2'">
                            <label class="btn btn-outline-primary btn-sm" th:for="'p' + ${slot.index} + '_2'">2</label>
                        </th:block>

                        <th:block th:if="${slot.template.outcomeType.name() == 'DOUBLE_CHANCE'}">
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="1X" th:id="'p' + ${slot.index} + '_1X'" required>
                            <label class="btn btn-outline-success btn-sm" th:for="'p' + ${slot.index} + '_1X'">1X</label>
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="12" th:id="'p' + ${slot.index} + '_12'">
                            <label class="btn btn-outline-success btn-sm" th:for="'p' + ${slot.index} + '_12'">12</label>
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="X2" th:id="'p' + ${slot.index} + '_X2'">
                            <label class="btn btn-outline-success btn-sm" th:for="'p' + ${slot.index} + '_X2'">X2</label>
                        </th:block>

                        <th:block th:if="${slot.template.outcomeType.name() == 'GOAL_NOGOAL'}">
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="GG" th:id="'p' + ${slot.index} + '_GG'" required>
                            <label class="btn btn-outline-warning btn-sm" th:for="'p' + ${slot.index} + '_GG'">GG</label>
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="NG" th:id="'p' + ${slot.index} + '_NG'">
                            <label class="btn btn-outline-warning btn-sm" th:for="'p' + ${slot.index} + '_NG'">NG</label>
                        </th:block>

                        <th:block th:if="${slot.template.outcomeType.name() == 'OVER_UNDER'}">
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="OVER"  th:id="'p' + ${slot.index} + '_OVER'"  required>
                            <label class="btn btn-outline-danger btn-sm" th:for="'p' + ${slot.index} + '_OVER'">Over</label>
                            <input type="radio" class="btn-check" th:name="'picks[' + ${slot.index} + '].pickedOutcome'" value="UNDER" th:id="'p' + ${slot.index} + '_UNDER'">
                            <label class="btn btn-outline-danger btn-sm" th:for="'p' + ${slot.index} + '_UNDER'">Under</label>
                        </th:block>

                    </div>
                </div>
            </div>

        </div>

        <div class="d-grid mt-4 mb-5">
            <button type="submit" class="btn btn-primary btn-lg">Invia schedina</button>
        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${deadline != null}" th:inline="javascript">
    const deadlineMs = new Date([[${#temporals.format(deadline, "yyyy-MM-dd'T'HH:mm:ss")}]]).getTime();
    const el = document.getElementById('countdown');

    function updateCountdown() {
        const diff = deadlineMs - Date.now();
        if (diff <= 0) {
            el.textContent = 'Scaduta';
            el.classList.add('text-danger');
            return;
        }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        el.textContent = `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>
</body>
</html>
