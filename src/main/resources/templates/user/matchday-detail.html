<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Fantaschedina — Giornata ' + ${matchday.number}">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{id}/matchdays(id=${league.id})}" th:text="${league.name}"></a>
            </li>
            <li class="breadcrumb-item active" th:text="'Giornata ' + ${matchday.number}"></li>
        </ol>
    </nav>

    <!-- Header giornata -->
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h4 class="mb-1" th:text="'Giornata ' + ${matchday.number}"></h4>
            <p class="text-muted mb-0" th:if="${myTeam != null}">
                La tua squadra: <strong th:text="${myTeam.name}"></strong>
            </p>
        </div>
        <span class="badge fs-6"
              th:classappend="${matchday.status.name() == 'OPEN'} ? 'bg-success' :
                               (${matchday.status.name() == 'PROCESSED'} ? 'bg-secondary' :
                               (${matchday.status.name() == 'RESULTS_LOADED'} ? 'bg-info text-dark' :
                               (${matchday.status.name() == 'CLOSED'} ? 'bg-danger' : 'bg-warning text-dark')))"
              th:text="${matchday.status}"></span>
    </div>

    <!-- Info scadenza / countdown -->
    <div th:if="${deadline != null}" class="alert"
         th:classappend="${matchday.status.name() == 'OPEN'} ? 'alert-success' : 'alert-secondary'">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <strong>Scadenza:</strong>
                <span th:text="${#temporals.format(deadline, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div th:if="${matchday.status.name() == 'OPEN'}" id="countdown" class="fw-bold fs-5"></div>
        </div>
    </div>
    <div th:unless="${deadline != null}" class="alert alert-warning">
        Scadenza non ancora impostata dall'amministratore.
    </div>

    <!-- Partite -->
    <h5 class="mt-4 mb-3">Partite</h5>

    <div th:if="${#lists.isEmpty(fixtures)}" class="alert alert-info">
        Nessuna partita caricata per questa giornata.
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(fixtures)}">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
                <tr>
                    <th class="text-end">Casa</th>
                    <th class="text-center" style="width: 80px;">Risultato</th>
                    <th>Trasferta</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="fixture : ${fixtures}">
                    <td class="text-end fw-semibold" th:text="${teamNames[fixture.homeFantaTeamId]}"></td>
                    <td class="text-center">
                        <span th:if="${fixture.resultLoaded}"
                              th:text="${fixture.homeScore} + ' - ' + ${fixture.awayScore}"
                              class="fw-bold"></span>
                        <span th:unless="${fixture.resultLoaded}" class="text-muted">vs</span>
                    </td>
                    <td class="fw-semibold" th:text="${teamNames[fixture.awayFantaTeamId]}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${deadline != null and matchday.status.name() == 'OPEN'}"
        th:inline="javascript">
    const deadlineMs = new Date([[${#temporals.format(deadline, "yyyy-MM-dd'T'HH:mm:ss")}]]).getTime();
    const el = document.getElementById('countdown');

    function updateCountdown() {
        const diff = deadlineMs - Date.now();
        if (diff <= 0) {
            el.textContent = 'Scaduta';
            el.classList.add('text-danger');
            return;
        }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        el.textContent = `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>
</body>
</html>
