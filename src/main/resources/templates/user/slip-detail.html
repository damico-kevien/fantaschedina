<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Schedina — Giornata ' + ${matchday.number}">Fantaschedina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Fantaschedina</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Esci</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 680px;">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{id}/matchdays(id=${league.id})}" th:text="${league.name}"></a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/leagues/{id}/history(id=${league.id})}">Storico</a>
            </li>
            <li class="breadcrumb-item active" th:text="'Giornata ' + ${matchday.number}"></li>
        </ol>
    </nav>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h4 class="mb-1" th:text="'Schedina — Giornata ' + ${matchday.number}"></h4>
            <p class="text-muted mb-0" th:text="${myTeam.name}"></p>
        </div>
        <div class="text-end">
            <span class="badge fs-6"
                  th:classappend="${slip.status.name() == 'WON'}  ? 'bg-success' :
                                   (${slip.status.name() == 'LOST'} ? 'bg-danger'  :
                                   (${slip.status.name() == 'VOID'} ? 'bg-secondary' : 'bg-warning text-dark'))"
                  th:text="${slip.status}"></span>
            <div class="text-muted small mt-1"
                 th:text="'Inviata il ' + ${#temporals.format(slip.submittedAt, 'dd/MM/yyyy HH:mm')}"></div>
            <span th:if="${slip.isAutoSubmitted}" class="badge bg-warning text-dark mt-1">Auto-inviata</span>
        </div>
    </div>

    <!-- Tabella pick con indicatori -->
    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
                <tr>
                    <th>Partita</th>
                    <th class="text-center">Tipo</th>
                    <th class="text-center">Esito</th>
                    <th th:if="${slip.status.name() != 'PENDING'}" class="text-center" style="width: 60px;"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="fixture : ${fixtures}"
                    th:with="pick=${picksByFixture[fixture.id]}">
                    <td>
                        <span th:text="${teamNames[fixture.homeFantaTeamId]}"></span>
                        <span class="text-muted mx-1">vs</span>
                        <span th:text="${teamNames[fixture.awayFantaTeamId]}"></span>
                        <div th:if="${fixture.resultLoaded}" class="text-muted small">
                            <span th:text="${fixture.homeScore} + ' - ' + ${fixture.awayScore}"></span>
                        </div>
                    </td>
                    <td class="text-center text-muted small" th:text="${pick?.outcomeType}"></td>
                    <td class="text-center">
                        <span th:if="${pick != null}" class="badge fs-6"
                              th:classappend="${pick.isCorrect == null}  ? 'bg-warning text-dark' :
                                              (${pick.isCorrect == true} ? 'bg-success' : 'bg-danger')"
                              th:text="${pick.pickedOutcome}">
                        </span>
                        <span th:unless="${pick != null}" class="text-muted">—</span>
                    </td>
                    <td th:if="${slip.status.name() != 'PENDING'}" class="text-center">
                        <span th:if="${pick?.isCorrect == true}"  class="text-success fw-bold">✓</span>
                        <span th:if="${pick?.isCorrect == false}" class="text-danger fw-bold">✗</span>
                        <span th:if="${pick == null or pick.isCorrect == null}" class="text-muted">—</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <a th:href="@{/leagues/{id}/history(id=${league.id})}" class="btn btn-outline-secondary btn-sm">
            ← Torna allo storico
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
